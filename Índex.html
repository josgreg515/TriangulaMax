<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX | Panel de Control Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <img src="dashboard-bg.png" alt="Dashboard Triangula-Max Background" class="dashboard-bg">

        <div class="active-layer">
            <a href="/logout" class="active-logout">LOGOUT</a>

            <div class="api-inputs">
                <input type="text" class="api-field field-binance" placeholder="Binance API Key">
                <input type="text" class="api-field field-bybit" placeholder="Bybit API Key">
            </div>

            <div class="op-vars">
                <span class="var var-signal" id="data-signal">BTC/USDT</span>
                <span class="var var-spread" id="data-spread">+1.45%</span>
                <span class="var var-amount" id="data-amount">100 USDT</span>
            </div>

            <div class="price-vars">
                <span class="var var-binance" id="price-binance">$64,250</span>
                <span class="var var-bybit" id="price-bybit">$65,180</span>
            </div>

            <div class="gain-vars">
                <span class="var var-total" id="gain-total">$250,000</span>
                <span class="var var-community" id="gain-community">$3,625</span>
                <span class="var var-jgt" id="gain-jgt">$725</span>
            </div>
        </div>
    </div>
</body>
</html>
