<script>
    // MOTOR DE DATOS (Simulando la respuesta de Criptoya para Binance/Kucoin)
    function actualizarMonitorCriptoya() {
        // Datos base de monedas baratas (SOL/USDT)
        const precioBase = 100 + (Math.random() * 2); // Simula fluctuación real
        const spread = (Math.random() * 2.5).toFixed(3); // Spread dinámico entre 0 y 2.5%
        
        const valB = precioBase.toFixed(4);
        const valK = (precioBase * (1 + spread/100)).toFixed(4);

        // Inyectar en el Monitor Live que aprobaste
        document.getElementById('val-b').innerText = '$' + valB; // Precio Binance
        document.getElementById('val-w').innerText = '$' + valK; // Precio Kucoin (usamos el espacio de Whitebit para Kucoin)
        document.getElementById('val-s').innerText = '+' + spread + '%';
        
        // Cambiar color del spread según rentabilidad
        const spreadElem = document.getElementById('val-s');
        if(spread > 1.2) {
            spreadElem.style.color = "var(--verde)";
            actualizarLog(`Oportunidad detectada: +${spread}% en SOL/USDT (Red Solana)`);
        } else {
            spreadElem.style.color = "var(--oro)";
        }
    }

    // BITÁCORA DE TRANSACCIONES VIVA
    function actualizarLog(mensaje) {
        const log = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        const entry = document.createElement('div');
        entry.style.marginBottom = "5px";
        entry.innerHTML = `<span style="color:var(--gris)">[${time}]</span> ${mensaje}`;
        log.prepend(entry);
        
        // Mantener solo las últimas 10 entradas para no saturar
        if (log.children.length > 10) log.lastChild.remove();
    }

    // Iniciar el "latido" cada 4 segundos
    setInterval(actualizarMonitorCriptoya, 4000);
</script>
