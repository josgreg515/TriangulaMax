<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX-BOT | Elite Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #d4af37; --cian: #00e5ff; --fondo: #0a0e14;
            --panel: rgba(16, 22, 30, 0.95); --borde: rgba(0, 229, 255, 0.2);
            --verde: #3fb950;
        }

        body {
            background: var(--fondo) radial-gradient(circle at top, #16222e 0%, #0a0e14 100%);
            color: white; font-family: 'Orbitron', sans-serif;
            margin: 0; display: flex; justify-content: center; padding: 20px; min-height: 100vh;
        }

        .main-frame {
            width: 100%; max-width: 450px; background: var(--panel);
            border: 1px solid var(--borde); border-radius: 25px; padding: 25px;
            box-shadow: 0 0 40px rgba(0,0,0,0.7); box-sizing: border-box;
        }

        /* ENCABEZADO */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-txt { color: var(--cian); font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; }
        .status-box { text-align: right; font-size: 0.55rem; color: #8b949e; }

        /* IDIOMA ARRIBA */
        .lang-section { margin-bottom: 20px; text-align: right; }
        .lang-select {
            background: #0d1117; color: var(--oro); border: 1px solid var(--borde);
            font-size: 0.65rem; padding: 5px 10px; border-radius: 5px; cursor: pointer;
        }

        /* BOTONES PRINCIPALES */
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 25px; }
        .tab-btn {
            flex: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--borde);
            color: #8b949e; padding: 10px 5px; font-family: 'Orbitron';
            font-size: 0.55rem; cursor: pointer; border-radius: 8px; transition: 0.3s;
        }
        .tab-btn.active { border-color: var(--oro); color: var(--oro); background: rgba(212, 175, 55, 0.1); }

        /* CONTENEDORES DE RESULTADO (SUB-CUADROS) */
        .sub-panel {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px; padding: 20px; display: none; margin-bottom: 20px;
        }
        .sub-panel.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MONITOR DE RASTREO (ANILLO) */
        .track-circle {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid #0d1117; border-top: 4px solid var(--cian);
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); animation: spin 4s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .track-val { font-size: 1.1rem; color: white; transform: rotate(-360deg); font-weight: bold; }

        /* INPUTS Y BOTONES INTERNOS */
        select, input {
            width: 100%; background: #05070a; border: 1px solid var(--borde);
            color: var(--cian); padding: 12px; margin-top: 10px; border-radius: 8px; font-family: 'Orbitron'; font-size: 0.7rem;
        }
        .btn-exec {
            width: 100%; background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 1px solid var(--oro); color: var(--oro); padding: 15px;
            margin-top: 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="main-frame">
    <div class="header">
        <div class="logo-txt">TRIANGULA-MAX</div>
        <div class="status-box">ESTADO: <span style="color:var(--verde)">ONLINE</span><br>ADMIN: José Gregorio</div>
    </div>

    <div class="lang-section">
        <select class="lang-select">
            <option>ESPAÑOL</option>
            <option>ENGLISH</option>
        </select>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('arbitraje', this)">ARBITRAJE</button>
        <button class="tab-btn" onclick="showTab('historial', this)">HISTORIAL</button>
        <button class="tab-btn" onclick="showTab('llaves', this)">LLAVES API</button>
    </div>

    <div id="arbitraje" class="sub-panel active">
        <h3 style="font-size:0.7rem; color:var(--oro); margin-top:0;">CENTRO DE MANDO</h3>
        <label style="font-size:0.5rem; color:#8b949e;">ESTRATEGIA:</label>
        <select id="strategy">
            <option value="tri">Binance Triangular (Interno)</option>
            <option value="inter">Inter-Plataforma (Externo)</option>
        </select>

        <div class="track-circle">
            <div class="track-val" id="live-spread">+1.47%</div>
        </div>

        <div style="display:flex; gap:10px;">
            <button class="tab-btn active" style="font-size:0.5rem;">MANUAL</button>
            <button class="tab-btn" style="font-size:0.5rem;">AUTO</button>
        </div>

        <button class="btn-exec" onclick="alert('Iniciando Triangulación...')">EJECUTAR ARBITRAJE</button>
    </div>

    <div id="historial" class="sub-panel">
        <h3 style="font-size:0.7rem; color:var(--oro); margin-top:0;">PROFIT GENERADO</h3>
        <div style="font-size: 1.8rem; color: var(--verde); text-align:center; margin: 20px 0;">$1,240.55</div>
        <div style="font-size:0.5rem; color:#8b949e; text-align:center;">Últimas 24h: +$45.20</div>
    </div>

    <div id="llaves" class="sub-panel">
        <h3 style="font-size:0.7rem; color:var(--oro); margin-top:0;">GESTIÓN DE LLAVES</h3>
        <input type="password" placeholder="API KEY (Binance/WhiteBit)">
        <input type="password" placeholder="SECRET KEY">
        <p style="font-size:0.45rem; color:#444; margin-top:10px;">Las llaves están encriptadas localmente bajo protocolo AES-256.</p>
    </div>

    <button style="width:100%; background:none; border:1px solid #333; color:#555; font-size:0.5rem; padding:10px; border-radius:8px; margin-top:10px;">📜 VER PROTOCOLOS Y SEGURIDAD</button>
</div>

<script>
    function showTab(tabId, btn) {
        // Quitar activos
        document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        // Activar seleccionado
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    // Simulación de Spread
    setInterval(() => {
        let base = 1.20;
        let random = (Math.random() * 0.5).toFixed(2);
        document.getElementById('live-spread').innerText = "+" + (parseFloat(base) + parseFloat(random)).toFixed(2) + "%";
    }, 3000);
</script>

</body>
</html>
