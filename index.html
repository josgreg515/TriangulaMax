<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX | José Gregorio Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --oro: #d4af37; --cian: #00e5ff; --fondo: #0a0e14; --panel: rgba(16, 22, 30, 0.95); --borde: rgba(0, 229, 255, 0.2); --verde: #3fb950; --rojo: #ff4d4d; }
        body { background: var(--fondo) radial-gradient(circle at top, #16222e 0%, #0a0e14 100%); color: white; font-family: 'Orbitron', sans-serif; margin: 0; display: flex; justify-content: center; padding: 10px; min-height: 100vh; }
        .main-frame { width: 100%; max-width: 480px; background: var(--panel); border: 2px solid var(--borde); border-radius: 25px; padding: 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(0,229,255,0.1); padding-bottom: 10px; }
        .logo-img { height: 45px; filter: drop-shadow(0 0 8px var(--cian)); }
        .lang-bar { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .lang-select { background: #0d1117; color: var(--oro); border: 1px solid var(--borde); font-size: 0.6rem; padding: 5px; border-radius: 4px; cursor: pointer; }
        .nav-tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; background: #1c2128; border: 1px solid var(--borde); color: #8b949e; padding: 10px 2px; font-family: 'Orbitron'; font-size: 0.5rem; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { border-color: var(--oro); color: var(--oro); background: rgba(212, 175, 55, 0.1); }
        .tab-admin { border-color: var(--rojo); color: var(--rojo); }
        .sub-panel { display: none; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px; min-height: 420px; }
        .sub-panel.active { display: block; }
        .price-terminal { background: #05070a; border: 1px solid var(--borde); border-radius: 8px; padding: 15px; margin: 15px 0; font-family: 'Roboto Mono'; }
        .price-line { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .val-ex { font-size: 0.85rem; color: var(--cian); font-weight: bold; }
        label { font-size: 0.55rem; color: var(--oro); display: block; margin-top: 10px; text-transform: uppercase; }
        select, input { width: 100%; background: #0d1117; border: 1px solid #333; color: var(--cian); padding: 10px; margin-top: 5px; border-radius: 6px; font-family: 'Orbitron'; font-size: 0.65rem; box-sizing: border-box; }
        .btn-exec { width: 100%; background: #1a1a1a; border: 1px solid var(--oro); color: var(--oro); padding: 15px; margin-top: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-seguridad { width: 100%; background: transparent; border: 1px solid rgba(0, 229, 255, 0.3); color: var(--cian); padding: 8px; margin-top: 10px; border-radius: 6px; cursor: pointer; font-size: 0.55rem; text-transform: uppercase; }
        .log-terminal { background: #000; border: 1px solid #222; height: 100px; overflow-y: auto; padding: 10px; font-family: 'Roboto Mono'; font-size: 0.55rem; color: var(--verde); border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="main-frame">
    <div class="header">
        <img src="logo.png" alt="TM" class="logo-img">
        <div style="font-size: 0.5rem; color: #8b949e;">ADMIN: <b>JOSÉ GREGORIO</b></div>
    </div>
    <div class="lang-bar">
        <select class="lang-select" id="langSelect" onchange="changeLanguage()">
            <option value="es">ESPAÑOL</option><option value="en">ENGLISH</option><option value="pt">PORTUGUÊS</option><option value="it">ITALIANO</option><option value="ru">РУССКИЙ</option><option value="ar">العربية</option>
        </select>
    </div>
    <div class="nav-tabs">
        <button class="tab-btn active" id="t-arb" onclick="showTab('arbitraje', this)">ARBITRAJE</button>
        <button class="tab-btn" id="t-hist" onclick="showTab('historial', this)">HISTORIAL</button>
        <button class="tab-btn" id="t-keys" onclick="showTab('llaves', this)">LLAVES API</button>
        <button class="tab-btn tab-admin" id="t-adm" onclick="showTab('admin', this)">⚙️ ADMINISTRACIÓN</button>
    </div>
    <div id="arbitraje" class="sub-panel active">
        <h3 id="l-mando" style="font-size:0.75rem; color:var(--oro); margin:0;">CENTRO DE MANDO</h3>
        <label id="l-act">Activo:</label>
        <select><option>BTC/USDT</option><option>ETH/USDT</option><option>SOL/USDT</option></select>
        <label id="l-red">Red Económica:</label>
        <select id="net"><option>Solana ($0.01)</option><option>Polygon ($0.02)</option><option>TRC-20 ($1.00)</option><option>Litecoin ($0.20)</option></select>
        <div class="price-terminal">
            <div class="price-line"><span>BINANCE</span><span class="val-ex">$71,946.205</span></div>
            <div class="price-line"><span>WHITEBIT</span><span class="val-ex" style="color:var(--verde)">$73,025.398</span></div>
            <div class="price-line" style="border-top:1px dashed #333; margin-top:10px; padding-top:10px;"><span id="l-spr" style="color:var(--oro)">SPREAD LIVE</span><span class="val-ex" style="color:var(--verde)">+1.502%</span></div>
        </div>
        <button class="btn-exec" id="b-run" onclick="run()">EJECUTAR</button>
        <div class="log-terminal" id="log">> Listo.</div>
        <button class="btn-seguridad" id="b-sec" onclick="alert('Cifrado AES-256 Activo')">AVISO DE SEGURIDAD</button>
    </div>
    <div id="admin" class="sub-panel"><h3>ADMIN</h3><label>Base $:</label><input type="number" value="71946"></div>
    <div id="llaves" class="sub-panel"><h3>API KEYS</h3><input type="password" placeholder="Key"></div>
    <div id="historial" class="sub-panel"><h3>HISTORY</h3></div>
</div>
<script>
    const lang = {
        es: {m:"CENTRO DE MANDO", a:"Activo:", r:"Red Económica:", s:"SPREAD LIVE", x:"EJECUTAR", y:"AVISO DE SEGURIDAD", t1:"ARBITRAJE", t2:"HISTORIAL", t3:"LLAVES API", t4:"ADMINISTRACIÓN"},
        en: {m:"COMMAND CENTER", a:"Asset:", r:"Economic Network:", s:"SPREAD LIVE", x:"EXECUTE", y:"SECURITY NOTICE", t1:"ARBITRAGE", t2:"HISTORY", t3:"API KEYS", t4:"ADMINISTRATION"}
    };
    function changeLanguage() {
        const l = document.getElementById('langSelect').value;
        const d = lang[l] || lang.en;
        document.getElementById('l-mando').innerText = d.m; document.getElementById('l-act').innerText = d.a;
        document.getElementById('l-red').innerText = d.r; document.getElementById('l-spr').innerText = d.s;
        document.getElementById('b-run').innerText = d.x; document.getElementById('b-sec').innerText = d.y;
        document.getElementById('t-arb').innerText = d.t1; document.getElementById('t-hist').innerText = d.t2;
        document.getElementById('t-keys').innerText = d.t3; document.getElementById('t-adm').innerText = d.t4;
    }
    function showTab(id, b) { document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); b.classList.add('active'); }
    function run() { const l = document.getElementById('log'); l.innerHTML = "> Ciclo Iniciado..."; setTimeout(()=> {l.innerHTML += "<br>> Finalizado."}, 2000); }
</script>
</body>
</html>
