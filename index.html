<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX | Admin Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #d4af37; --cian: #00e5ff; --fondo: #0a0e14;
            --panel: rgba(16, 22, 30, 0.95); --borde: rgba(0, 229, 255, 0.2);
            --verde: #3fb950; --rojo: #ff4d4d;
        }

        body {
            background: var(--fondo) radial-gradient(circle at top, #16222e 0%, #0a0e14 100%);
            color: white; font-family: 'Orbitron', sans-serif;
            margin: 0; display: flex; justify-content: center; padding: 10px; min-height: 100vh;
        }

        .main-frame {
            width: 100%; max-width: 480px; background: var(--panel);
            border: 2px solid var(--borde); border-radius: 25px; padding: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.7); box-sizing: border-box; position: relative;
        }

        /* HEADER & LANG */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(0,229,255,0.1); padding-bottom: 10px; }
        .logo-img { height: 45px; filter: drop-shadow(0 0 5px var(--cian)); }
        .lang-select { background: #0d1117; color: var(--oro); border: 1px solid var(--borde); font-size: 0.6rem; padding: 5px; border-radius: 4px; }

        /* TABS */
        .nav-tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; background: #1c2128; border: 1px solid var(--borde); color: #8b949e; padding: 8px 2px; font-family: 'Orbitron'; font-size: 0.5rem; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { border-color: var(--oro); color: var(--oro); background: rgba(212, 175, 55, 0.1); }
        .tab-admin { border-color: var(--rojo); color: var(--rojo); }

        /* PANELS */
        .sub-panel { display: none; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px; min-height: 320px; }
        .sub-panel.active { display: block; animation: fadeIn 0.3s ease; }

        /* PRICE BOX */
        .price-terminal { background: #05070a; border: 1px solid var(--borde); border-radius: 8px; padding: 15px; margin: 15px 0; font-family: 'Roboto Mono'; }
        .price-line { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .label-ex { font-size: 0.6rem; color: #8b949e; }
        .val-ex { font-size: 0.8rem; color: var(--cian); font-weight: bold; }

        /* ADMIN FORM */
        .admin-form label { font-size: 0.55rem; color: var(--oro); display: block; margin-top: 10px; }
        .admin-input { width: 100%; background: #0d1117; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px; font-family: 'Roboto Mono'; font-size: 0.7rem; margin-top: 4px; }

        /* BUTTONS */
        .btn-exec { width: 100%; background: #1a1a1a; border: 1px solid var(--oro); color: var(--oro); padding: 14px; margin-top: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-save { border-color: var(--verde); color: var(--verde); margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-frame">
    <div class="header">
        <img src="logo.png" alt="TM" class="logo-img">
        <select class="lang-select" id="lang-switcher">
            <option value="es">ESPAÑOL</option>
            <option value="en">ENGLISH</option>
        </select>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('arbitraje', this)">ARBITRAJE</button>
        <button class="tab-btn" onclick="showTab('historial', this)">HISTORIAL</button>
        <button class="tab-btn" onclick="showTab('llaves', this)">LLAVES API</button>
        <button class="tab-btn tab-admin" onclick="showTab('admin', this)">⚙️ PANEL</button>
    </div>

    <div id="arbitraje" class="sub-panel active">
        <h3 style="font-size:0.7rem; color:var(--oro); margin:0;">OPORTUNIDADES DE MERCADO</h3>
        
        <label style="font-size: 0.5rem; color: #8b949e; margin-top:10px; display:block;">SELECCIONAR PAR:</label>
        <select id="pair-selector" onchange="updatePrices()">
            </select>

        <div class="price-terminal">
            <div class="price-line"><span class="label-ex">BINANCE</span><span id="p1" class="val-ex">$0.00</span></div>
            <div class="price-line"><span class="label-ex">WHITEBIT</span><span id="p2" class="val-ex">$0.00</span></div>
            <div class="price-line"><span class="label-ex">KUCOIN</span><span id="p3" class="val-ex">$0.00</span></div>
            <div class="price-line" style="border:none; margin-top:10px; padding-top:10px; border-top:1px dashed #333">
                <span class="label-ex" style="color:var(--oro)">NET SPREAD</span>
                <span id="p-spread" class="val-ex" style="color:var(--verde)">0.00%</span>
            </div>
        </div>
        <button class="btn-exec" onclick="alert('Iniciando...')">EJECUTAR ARBITRAJE</button>
    </div>

    <div id="admin" class="sub-panel">
        <h3 style="font-size:0.7rem; color:var(--rojo); margin:0;">CONFIGURACIÓN CRIPTOS</h3>
        <p style="font-size:0.5rem; color:#8b949e;">Cambia los pares disponibles sin usar código:</p>
        
        <div class="admin-form">
            <div style="border-bottom:1px solid #222; padding-bottom:10px;">
                <label>PAR 1 (Nombre y Precio Base):</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="name1" class="admin-input" value="BTC / USDT">
                    <input type="number" id="val1" class="admin-input" value="65000">
                </div>
            </div>

            <div style="border-bottom:1px solid #222; padding-bottom:10px;">
                <label>PAR 2 (Nombre y Precio Base):</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="name2" class="admin-input" value="ETH / USDT">
                    <input type="number" id="val2" class="admin-input" value="3500">
                </div>
            </div>

            <div>
                <label>PAR 3 (Oportunidad Nueva):</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="name3" class="admin-input" value="SOL / USDT">
                    <input type="number" id="val3" class="admin-input" value="145">
                </div>
            </div>

            <button class="btn-exec btn-save" onclick="saveAdminChanges()">APLICAR CAMBIOS EN VIVO</button>
        </div>
    </div>

    <div id="historial" class="sub-panel"><h3>HISTORIAL</h3></div>
    <div id="llaves" class="sub-panel"><h3>LLAVES API</h3></div>

    <div style="font-size:0.5rem; color:#444; text-align:center; margin-top:10px;">TRIANGULA-MAX v2.0 - Powered by José Gregorio</div>
</div>

<script>
    // Base de datos local simulada
    let configCriptos = [
        { id: 'c1', nombre: "BTC / USDT", precio: 65000 },
        { id: 'c2', nombre: "ETH / USDT", precio: 3500 },
        { id: 'c3', nombre: "SOL / USDT", precio: 145 }
    ];

    function showTab(id, btn) {
        document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // FUNCIÓN DE ADMIN: Guarda cambios sin tocar código
    function saveAdminChanges() {
        configCriptos[0].nombre = document.getElementById('name1').value;
        configCriptos[0].precio = parseFloat(document.getElementById('val1').value);
        
        configCriptos[1].nombre = document.getElementById('name2').value;
        configCriptos[1].precio = parseFloat(document.getElementById('val2').value);
        
        configCriptos[2].nombre = document.getElementById('name3').value;
        configCriptos[2].precio = parseFloat(document.getElementById('val3').value);
        
        renderSelectors();
        alert("¡Configuración actualizada con éxito!");
        showTab('arbitraje', document.querySelector('.tab-btn')); // Regresa a la vista usuario
    }

    function renderSelectors() {
        const sel = document.getElementById('pair-selector');
        sel.innerHTML = "";
        configCriptos.forEach((c, index) => {
            let opt = document.createElement('option');
            opt.value = index;
            opt.innerText = c.nombre;
            sel.appendChild(opt);
        });
    }

    function updatePrices() {
        const idx = document.getElementById('pair-selector').value;
        const base = configCriptos[idx].precio;
        
        let b = base + (Math.random() * (base * 0.002));
        document.getElementById('p1').innerText = "$" + b.toLocaleString();
        document.getElementById('p2').innerText = "$" + (b + (base * 0.008)).toLocaleString();
        document.getElementById('p3').innerText = "$" + (b - (base * 0.001)).toLocaleString();
        document.getElementById('p-spread').innerText = "+" + (0.85 + Math.random()*0.6).toFixed(2) + "%";
    }

    // Inicialización
    renderSelectors();
    setInterval(updatePrices, 2000);
</script>

</body>
</html>
