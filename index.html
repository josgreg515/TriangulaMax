<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX-BOT | Global Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #d4af37;
            --cian: #00e5ff;
            --fondo: #05070a;
            --panel: rgba(20, 27, 38, 0.8);
            --borde: rgba(212, 175, 55, 0.3);
            --verde: #3fb950;
        }

        body {
            background-color: var(--fondo);
            background-image: radial-gradient(circle at center, #101a26 0%, #05070a 100%);
            color: white;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .main-frame {
            width: 100%;
            max-width: 1100px;
            background: var(--panel);
            border: 2px solid var(--borde);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        .real-logo {
            height: 65px;
            filter: drop-shadow(0 0 10px var(--cian));
        }

        /* TABS FUNCIONALES */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; justify-content: flex-start; }
        .tab-btn { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--borde); color: #8b949e; 
            padding: 8px 15px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; border-radius: 5px;
        }
        .tab-btn.active { border-color: var(--oro); color: var(--oro); background: rgba(212, 175, 55, 0.1); }

        .lang-bar {
            display: flex; justify-content: flex-end; gap: 10px;
            margin-bottom: 20px; padding-top: 5px;
        }

        .lang-select {
            background: rgba(0,0,0,0.5); color: var(--oro); border: 1px solid var(--borde);
            font-size: 0.6rem; padding: 4px 8px; border-radius: 4px; cursor: pointer;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .module {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px; padding: 20px;
        }

        .module h3 {
            color: var(--oro); font-size: 0.8rem; margin-top: 0;
            border-left: 3px solid var(--cian); padding-left: 10px; text-transform: uppercase;
        }

        /* ACORDEONES EXCHANGES */
        .accordion {
            background: #0d1117; color: var(--oro); cursor: pointer; padding: 12px; width: 100%;
            border: 1px solid var(--borde); text-align: left; font-size: 0.7rem; font-family: 'Orbitron';
            border-radius: 6px; margin-top: 10px; display: flex; justify-content: space-between;
        }
        .panel { padding: 0 10px; background: rgba(0,0,0,0.3); max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; }

        input, select {
            width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px;
            font-family: 'Orbitron'; font-size: 0.75rem; box-sizing: border-box;
            background: #0d1117; color: var(--cian); border: 1px solid var(--borde);
        }

        /* MONITOR DE PRECIOS MEJORADO */
        .price-monitor { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .price-box { text-align: center; }
        .price-val { font-size: 1.1rem; font-weight: bold; font-family: 'Roboto Mono'; color: var(--cian); }
        .price-label { font-size: 0.5rem; color: #8b949e; display: block; }

        /* MODO SELECTOR */
        .mode-selector { display: flex; gap: 10px; margin: 15px 0; }
        .btn-mode { 
            flex: 1; padding: 10px; font-family: 'Orbitron'; font-size: 0.65rem;
            background: rgba(255,255,255,0.05); border: 1px solid var(--borde); color: #8b949e; cursor: pointer; border-radius: 5px;
        }
        .btn-mode.active { border-color: var(--verde); color: var(--verde); background: rgba(63, 185, 80, 0.1); }

        .btn-action {
            width: 100%; background: linear-gradient(135deg, #1a1a1a, #333);
            border: 1px solid var(--oro); color: var(--oro); cursor: pointer;
            font-weight: bold; margin-top: 10px; text-transform: uppercase; padding: 15px; border-radius: 6px;
        }
        .btn-action:hover { background: var(--oro); color: black; box-shadow: 0 0 20px var(--oro); }

        #spread-live { font-size: 1.5rem; color: var(--oro); font-weight: bold; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
    </style>
</head>
<body>

<div class="main-frame">
    <div class="top-bar">
        <img src="logo.png" alt="TRIANGULA-MAX" class="real-logo">
        <div style="text-align: right; font-size: 0.6rem; color: #8b949e;">
            <span id="txt-status-label">ESTADO:</span> <span style="color: #3fb950;">ONLINE</span><br>
            ADMIN: <b>TRIANGULA-MAX-BOT</b>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active">ARBITRAJE</button>
        <button class="tab-btn">HISTORIAL</button>
        <button class="tab-btn">LLAVES API</button>
    </div>

    <div class="lang-bar">
        <span style="font-size: 0.6rem; color: #8b949e; align-self: center;" id="txt-lang-label">IDIOMA:</span>
        <select class="lang-select" id="lang-switcher" onchange="cambiarIdioma()">
            <option value="es">ESPAÑOL</option>
            <option value="en">ENGLISH</option>
            <option value="pt">PORTUGUÊS</option>
        </select>
    </div>

    <div class="grid-container">
        <div class="module">
            <h3 id="txt-title-mando">Centro de Mando</h3>
            <div class="price-monitor">
                <div class="price-box">
                    <span class="price-label">BINANCE (BUY)</span>
                    <span id="p-buy" class="price-val">$0.00</span>
                </div>
                <div style="color:var(--oro)">➔</div>
                <div class="price-box">
                    <span class="price-label">WHITEBIT (SELL)</span>
                    <span id="p-sell" class="price-val" style="color:var(--verde)">$0.00</span>
                </div>
            </div>

            <div style="text-align: center; margin-bottom: 20px;">
                <div id="spread-live">+0.00%</div>
                <div style="font-size: 0.55rem; color: #8b949e;" id="txt-live-label">RASTREO EN VIVO</div>
            </div>

            <div class="mode-selector">
                <button class="btn-mode active" onclick="setMode('manual')">MANUAL</button>
                <button class="btn-mode" onclick="setMode('auto')">AUTO</button>
            </div>

            <button class="btn-action" id="btn-exec" onclick="lanzar()">EJECUTAR ARBITRAJE</button>
        </div>

        <div class="module">
            <h3 id="txt-title-seg">Seguridad y Llaves</h3>
            
            <button class="accordion" onclick="toggleAcc(this)">BINANCE GLOBAL <span>▼</span></button>
            <div class="panel">
                <input type="password" placeholder="API Key">
                <input type="password" placeholder="Secret Key">
            </div>

            <button class="accordion" onclick="toggleAcc(this)">WHITEBIT <span>▼</span></button>
            <div class="panel">
                <input type="password" placeholder="API Key">
                <input type="password" placeholder="Secret Key">
            </div>

            <button class="accordion" onclick="toggleAcc(this)">KUCOIN <span>▼</span></button>
            <div class="panel">
                <input type="password" placeholder="API Key">
                <input type="password" placeholder="Passphrase">
            </div>

            <p style="font-size: 0.5rem; color: #444; margin-top: 20px;" id="txt-seg-footer">TRIANGULA-MAX-BOT Security Protocol Active.</p>
        </div>

        <div class="module">
            <h3 id="txt-title-ben">Beneficios</h3>
            <div style="font-size: 1.8rem; color: var(--oro); margin-bottom: 5px;">$250,000</div>
            <span style="font-size: 0.5rem; color: #8b949e;">TOTAL TRADED (USDT)</span>
            
            <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">
                <div style="display:flex; justify-content:space-between; font-size:0.6rem;">
                    <span>NET PROFIT:</span>
                    <span style="color:var(--verde)">+$1,420.50</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const traducciones = {
        es: { mando: "Centro de Mando", live: "RASTREO EN VIVO", exec: "EJECUTAR ARBITRAJE", seg: "Seguridad y Llaves", ben: "Beneficios", alert: "SISTEMA ACTIVO\nProcesando..." },
        en: { mando: "Command Center", live: "LIVE TRACKING", exec: "EXECUTE ARBITRAGE", seg: "Security & Keys", ben: "Profits", alert: "SYSTEM ACTIVE\nProcessing..." }
    };

    function toggleAcc(btn) {
        var panel = btn.nextElementSibling;
        panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
    }

    function setMode(mode) {
        document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function cambiarIdioma() {
        const lang = document.getElementById('lang-switcher').value;
        const t = traducciones[lang] || traducciones.es;
        document.getElementById('txt-title-mando').innerText = t.mando;
        document.getElementById('txt-live-label').innerText = t.live;
        document.getElementById('btn-exec').innerText = t.exec;
        document.getElementById('txt-title-seg').innerText = t.seg;
        document.getElementById('txt-title-ben').innerText = t.ben;
    }

    async function lanzar() {
        const btn = document.getElementById('btn-exec');
        btn.disabled = true; btn.innerText = "WAIT...";
        try {
            await fetch('https://triangulamax-servidor.onrender.com/ejecutar-arbitraje', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ admin: "TRIANGULA-MAX-BOT" })
            });
            alert("Protocolo Iniciado Exitosamente");
        } catch (e) {
            alert("Servidor Offline - Modo Simulación Activo");
        } finally {
            btn.disabled = false; cambiarIdioma();
        }
    }

    // SIMULACIÓN DE PRECIOS REALISTA
    setInterval(() => {
        let base = 60000 + Math.random() * 200;
        let sell = base + (base * 0.012); // Simula un spread de 1.2%
        document.getElementById('p-buy').innerText = "$" + base.toFixed(2);
        document.getElementById('p-sell').innerText = "$" + sell.toFixed(2);
        document.getElementById('spread-live').innerText = "+" + ((sell-base)/base*100).toFixed(2) + "%";
    }, 2500);
</script>

</body>
</html>
