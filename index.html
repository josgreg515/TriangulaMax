<div class="module">
    <h3>Centro de Mando</h3>
    <div style="margin-bottom:15px;">
        <label style="font-size: 0.6rem; color: #8b949e;">SELECCIONAR ESTRATEGIA:</label>
        <select id="bot-type" style="width:100%; background:#0d1117; color:var(--cian); border:1px solid var(--borde); padding:8px; border-radius:5px; font-family:'Orbitron';">
            <option value="tri">CENTINELA TRIANGULAR (Binance)</option>
            <option value="inter">CENTINELA INTER-PLATAFORMA</option>
        </select>
    </div>

    <div id="pair-selection" style="margin-bottom:15px;">
        <label style="font-size: 0.6rem; color: #8b949e;">PAR DE TRABAJO:</label>
        <div style="display:flex; gap:5px; margin-top:5px;">
            <button class="btn-pair active" style="flex:1; font-size:0.6rem; padding:5px; background:rgba(0,229,255,0.1); border:1px solid var(--cian); color:white; border-radius:3px;">BTC/USDT</button>
            <button class="btn-pair" style="flex:1; font-size:0.6rem; padding:5px; background:transparent; border:1px solid #333; color:#666; border-radius:3px;">ETH/USDT</button>
            <button class="btn-pair" style="flex:1; font-size:0.6rem; padding:5px; background:transparent; border:1px solid #333; color:#666; border-radius:3px;">SOL/USDT</button>
        </div>
    </div>

    <div class="visual-data">
        <div class="circle-chart" id="radar">
            <span style="font-size: 0.7rem;" id="spread-val">+1.45%</span>
        </div>
        <div style="text-align: left;">
            <p style="margin: 0; font-size: 0.6rem; color:#8b949e;">STATUS:</p>
            <b id="bot-status" style="color: #3fb950; font-size: 0.8rem;">RASTREANDO...</b>
        </div>
    </div>
    <button class="btn-action" onclick="ejecutarOperacion()">INICIAR CICLO OPERATIVO</button>
</div>
