<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX | Final Build</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #d4af37; --cian: #00e5ff; --fondo: #0a0e14;
            --panel: rgba(16, 22, 30, 0.95); --borde: rgba(0, 229, 255, 0.2);
            --verde: #3fb950; --rojo: #ff4d4d;
        }

        body {
            background: var(--fondo) radial-gradient(circle at top, #16222e 0%, #0a0e14 100%);
            color: white; font-family: 'Orbitron', sans-serif;
            margin: 0; display: flex; justify-content: center; padding: 10px; min-height: 100vh;
        }

        .main-frame {
            width: 100%; max-width: 480px; background: var(--panel);
            border: 2px solid var(--borde); border-radius: 25px; padding: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.7); box-sizing: border-box;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(0,229,255,0.1); padding-bottom: 10px; }
        .logo-img { height: 45px; filter: drop-shadow(0 0 5px var(--cian)); }

        .nav-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #1c2128; border: 1px solid var(--borde); color: #8b949e; padding: 10px 2px; font-family: 'Orbitron'; font-size: 0.5rem; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        .tab-btn.active { border-color: var(--oro); color: var(--oro); background: rgba(212, 175, 55, 0.1); }
        .tab-admin { border-color: var(--rojo); color: var(--rojo); }

        /* CONTENEDORES DINÁMICOS */
        .sub-panel { display: none; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px; min-height: 350px; }
        .sub-panel.active { display: block; animation: fadeIn 0.3s ease; }

        /* PRECIOS EN CAJA ÚNICA */
        .price-terminal { background: #05070a; border: 1px solid var(--borde); border-radius: 8px; padding: 15px; margin: 15px 0; font-family: 'Roboto Mono'; }
        .price-line { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .label-ex { font-size: 0.65rem; color: #8b949e; }
        .val-ex { font-size: 0.85rem; color: var(--cian); font-weight: bold; }

        /* FORMULARIOS */
        .admin-section { border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 10px; }
        label { font-size: 0.55rem; color: var(--oro); display: block; margin-bottom: 5px; }
        select, input { width: 100%; background: #0d1117; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; font-family: 'Orbitron'; font-size: 0.65rem; box-sizing: border-box; margin-bottom: 10px; }

        .btn-exec { width: 100%; background: #1a1a1a; border: 1px solid var(--oro); color: var(--oro); padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-frame">
    <div class="header">
        <div style="color:var(--cian); font-weight:bold; font-size:1.2rem;">TRIANGULA-MAX</div>
        <div style="text-align: right; font-size: 0.5rem; color: #8b949e;">ADMIN: <b>JOSÉ GREGORIO</b></div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('arbitraje', this)">ARBITRAJE</button>
        <button class="tab-btn" onclick="showTab('historial', this)">HISTORIAL</button>
        <button class="tab-btn" onclick="showTab('llaves', this)">LLAVES API</button>
        <button class="tab-btn tab-admin" onclick="showTab('admin', this)">⚙️ PANEL</button>
    </div>

    <div id="arbitraje" class="sub-panel active">
        <h3 style="font-size:0.7rem; color:var(--oro); margin:0 0 10px 0;">MERCADO EN VIVO</h3>
        <label>SELECCIONAR PAR ACTIVO:</label>
        <select id="pair-selector" onchange="updatePrices()"></select>

        <div class="price-terminal">
            <div class="price-line"><span class="label-ex">BINANCE</span><span id="p1" class="val-ex">$0.00</span></div>
            <div class="price-line"><span class="label-ex">WHITEBIT</span><span id="p2" class="val-ex">$0.00</span></div>
            <div class="price-line"><span class="label-ex">KUCOIN</span><span id="p3" class="val-ex">$0.00</span></div>
            <div class="price-line" style="border:none; margin-top:10px; padding-top:10px; border-top:1px dashed #333">
                <span class="label-ex" style="color:var(--oro)">NET SPREAD</span>
                <span id="p-spread" class="val-ex" style="color:var(--verde)">0.00%</span>
            </div>
        </div>
        <button class="btn-exec" onclick="alert('Iniciando...')">EJECUTAR ARBITRAJE</button>
    </div>

    <div id="historial" class="sub-panel">
        <h3 style="font-size:0.7rem; color:var(--oro); margin:0 0 20px 0;">ESTADÍSTICAS</h3>
        <div style="background:#05070a; padding:20px; border-radius:10px; text-align:center; border:1px solid #222;">
            <p style="font-size:0.5rem; color:#8b949e; margin:0;">TOTAL PROFIT</p>
            <h2 style="color:var(--verde); margin:10px 0;">$14,520.30</h2>
            <p style="font-size:0.4rem; color:#444;">ÚLTIMOS 30 DÍAS</p>
        </div>
    </div>

    <div id="llaves" class="sub-panel">
        <h3 style="font-size:0.7rem; color:var(--oro); margin:0 0 15px 0;">LLAVES API</h3>
        <label>BINANCE KEY</label><input type="password" placeholder="••••••••••••">
        <label>WHITEBIT KEY</label><input type="password" placeholder="••••••••••••">
        <label>KUCOIN KEY</label><input type="password" placeholder="••••••••••••">
    </div>

    <div id="admin" class="sub-panel">
        <h3 style="font-size:0.7rem; color:var(--rojo); margin:0 0 15px 0;">GESTOR DE ACTIVOS</h3>
        <div class="admin-section">
            <label>PAR 1:</label>
            <input type="text" id="name1" value="BTC / USDT" style="width:60%">
            <input type="number" id="val1" value="65000" style="width:35%">
        </div>
        <div class="admin-section">
            <label>PAR 2:</label>
            <input type="text" id="name2" value="ETH / USDT" style="width:60%">
            <input type="number" id="val2" value="3500" style="width:35%">
        </div>
        <button class="btn-exec" style="border-color:var(--verde); color:var(--verde);" onclick="saveAdmin()">GUARDAR CAMBIOS</button>
    </div>

</div>

<script>
    let config = [
        { nombre: "BTC / USDT", precio: 65000 },
        { nombre: "ETH / USDT", precio: 3500 }
    ];

    function showTab(id, btn) {
        // Ocultar todos los paneles
        document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
        // Quitar estado activo de todos los botones
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        // Mostrar el seleccionado
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function saveAdmin() {
        config[0].nombre = document.getElementById('name1').value;
        config[0].precio = parseFloat(document.getElementById('val1').value);
        config[1].nombre = document.getElementById('name2').value;
        config[1].precio = parseFloat(document.getElementById('val2').value);
        render();
        alert("¡Configuración guardada!");
    }

    function render() {
        const sel = document.getElementById('pair-selector');
        sel.innerHTML = config.map((c, i) => `<option value="${i}">${c.nombre}</option>`).join('');
    }

    function updatePrices() {
        const idx = document.getElementById('pair-selector').value;
        if(!config[idx]) return;
        const base = config[idx].precio;
        let b = base + (Math.random() * (base * 0.002));
        document.getElementById('p1').innerText = "$" + b.toLocaleString();
        document.getElementById('p2').innerText = "$" + (b + (base * 0.009)).toLocaleString();
        document.getElementById('p3').innerText = "$" + (b - (base * 0.001)).toLocaleString();
        document.getElementById('p-spread').innerText = "+" + (0.90 + Math.random()*0.5).toFixed(2) + "%";
    }

    render();
    setInterval(updatePrices, 2000);
</script>
</body>
</html>
