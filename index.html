<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX | Bot Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #d4af37; --cian: #00e5ff; --fondo: #0a0e14;
            --panel: rgba(16, 22, 30, 0.95); --borde: rgba(0, 229, 255, 0.2);
            --verde: #3fb950; --rojo: #ff4d4d;
        }

        body {
            background: var(--fondo) radial-gradient(circle at top, #16222e 0%, #0a0e14 100%);
            color: white; font-family: 'Orbitron', sans-serif;
            margin: 0; display: flex; justify-content: center; padding: 10px; min-height: 100vh;
        }

        .main-frame {
            width: 100%; max-width: 480px; background: var(--panel);
            border: 2px solid var(--borde); border-radius: 25px; padding: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.7); box-sizing: border-box;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(0,229,255,0.1); padding-bottom: 10px; }

        .lang-bar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .lang-select { background: #0d1117; color: var(--oro); border: 1px solid var(--borde); font-size: 0.6rem; padding: 5px; border-radius: 4px; }

        .nav-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #1c2128; border: 1px solid var(--borde); color: #8b949e; padding: 10px 2px; font-family: 'Orbitron'; font-size: 0.5rem; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { border-color: var(--oro); color: var(--oro); background: rgba(212, 175, 55, 0.1); }

        .sub-panel { display: none; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin-bottom: 15px; min-height: 400px; }
        .sub-panel.active { display: block; animation: fadeIn 0.3s ease; }

        .price-terminal { background: #05070a; border: 1px solid var(--borde); border-radius: 8px; padding: 15px; margin: 15px 0; font-family: 'Roboto Mono'; }
        .price-line { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .val-ex { font-size: 0.85rem; color: var(--cian); font-weight: bold; }

        .log-terminal { background: #000; border: 1px solid #222; height: 100px; overflow-y: auto; padding: 10px; font-family: 'Roboto Mono'; font-size: 0.55rem; color: var(--verde); border-radius: 5px; margin-top: 10px; }

        label { font-size: 0.55rem; color: var(--oro); display: block; margin-top: 10px; text-transform: uppercase; }
        select, input { width: 100%; background: #0d1117; border: 1px solid #333; color: var(--cian); padding: 10px; margin-top: 5px; border-radius: 6px; font-family: 'Orbitron'; font-size: 0.65rem; box-sizing: border-box; }
        
        .btn-exec { width: 100%; background: #1a1a1a; border: 1px solid var(--oro); color: var(--oro); padding: 15px; margin-top: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .tab-admin { border-color: var(--rojo); color: var(--rojo); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="main-frame">
    <div class="header">
        <div style="color:var(--cian); font-weight:bold; font-size:1.1rem;">TRIANGULA-MAX</div>
        <div style="text-align: right; font-size: 0.5rem; color: #8b949e;">ADMIN: <b>JOSÉ GREGORIO</b></div>
    </div>

    <div class="lang-bar">
        <select class="lang-select" id="lang-switcher" onchange="cambiarIdioma()">
            <option value="es">ESPAÑOL</option>
            <option value="en">ENGLISH</option>
            <option value="pt">PORTUGUÊS</option>
        </select>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('arbitraje', this)">ARBITRAJE</button>
        <button class="tab-btn" onclick="showTab('historial', this)">HISTORIAL</button>
        <button class="tab-btn" onclick="showTab('llaves', this)">LLAVES API</button>
        <button class="tab-btn tab-admin" onclick="showTab('admin', this)">⚙️ PANEL</button>
    </div>

    <div id="arbitraje" class="sub-panel active">
        <h3 id="txt-mando" style="font-size:0.75rem; color:var(--oro); margin:0;">SCANNER DE OPORTUNIDADES</h3>
        
        <label>Activo:</label>
        <select id="pair-selector" onchange="updatePrices()"></select>

        <div class="price-terminal">
            <div class="price-line"><span>BINANCE</span><span id="p1" class="val-ex">$0.00</span></div>
            <div class="price-line"><span>WHITEBIT</span><span id="p2" class="val-ex">$0.00</span></div>
            <div class="price-line"><span>KUCOIN</span><span id="p3" class="val-ex">$0.00</span></div>
            <div class="price-line" style="border-top:1px dashed #333; margin-top:10px; padding-top:10px;">
                <span style="color:var(--oro)">NET SPREAD (DIFERENCIA)</span>
                <span id="p-spread" class="val-ex" style="color:var(--verde)">0.00%</span>
            </div>
        </div>

        <button class="btn-exec" id="btn-exec" onclick="ejecutarCicloCompleto()">INICIAR CICLO DE ARBITRAJE</button>
        
        <div class="log-terminal" id="log-terminal">
            > Sistema iniciado. Esperando orden...
        </div>
    </div>

    <div id="llaves" class="sub-panel">
        <h3 style="font-size:0.75rem; color:var(--oro); margin:0;">CONEXIÓN SEGURA</h3>
        <p style="font-size:0.5rem; color:gray;">Introduce tus llaves para operar en real.</p>
        <div style="margin-top:10px;">
            <label>Binance API/Secret</label>
            <input type="password" placeholder="Key"><input type="password" placeholder="Secret">
            <label>WhiteBIT API/Secret</label>
            <input type="password" placeholder="Key"><input type="password" placeholder="Secret">
        </div>
    </div>

    <div id="admin" class="sub-panel">
        <h3 style="font-size:0.75rem; color:var(--rojo); margin:0;">CONFIGURACIÓN</h3>
        <label>Par 1: Nombre y Precio Base</label>
        <div style="display:flex; gap:5px;"><input type="text" id="n1" value="BTC/USDT"><input type="number" id="v1" value="65000"></div>
        <label>Spread Mínimo para Operar (%)</label>
        <input type="number" id="min-spread" value="1.5" step="0.1">
        <button class="btn-exec" style="border-color:var(--verde); color:var(--verde);" onclick="saveAdmin()">GUARDAR CONFIGURACIÓN</button>
    </div>

    <div id="historial" class="sub-panel"><h3>HISTORIAL</h3></div>
</div>

<script>
    let activos = [{ n: "BTC/USDT", v: 65000 }, { n: "ETH/USDT", v: 3500 }];
    let minSpread = 1.5;

    function showTab(id, btn) {
        document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function addLog(msg) {
        const log = document.getElementById('log-terminal');
        log.innerHTML += `<br>> ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    function saveAdmin() {
        activos[0].n = document.getElementById('n1').value;
        activos[0].v = parseFloat(document.getElementById('v1').value);
        minSpread = parseFloat(document.getElementById('min-spread').value);
        render();
        alert("Configuración Guardada");
    }

    function render() {
        const sel = document.getElementById('pair-selector');
        sel.innerHTML = activos.map((a, i) => `<option value="${i}">${a.n}</option>`).join('');
    }

    function updatePrices() {
        const idx = document.getElementById('pair-selector').value;
        const base = activos[idx].v;
        let b = base + (Math.random() * 50);
        let w = b + (b * 0.018); // Simulamos spread del 1.8%
        let k = b + (b * 0.005);
        document.getElementById('p1').innerText = "$" + b.toFixed(2);
        document.getElementById('p2').innerText = "$" + w.toFixed(2);
        document.getElementById('p3').innerText = "$" + k.toFixed(2);
        let spread = ((w - b) / b * 100).toFixed(2);
        document.getElementById('p-spread').innerText = "+" + spread + "%";
        return { spread, b, w };
    }

    async function ejecutarCicloCompleto() {
        const data = updatePrices();
        addLog("Iniciando escaneo de liquidez...");
        
        if(data.spread < minSpread) {
            addLog(`ABORTADO: Spread (${data.spread}%) insuficiente.`);
            return;
        }

        addLog(`OPORTUNIDAD DETECTADA: ${data.spread}%`);
        addLog("PASO 1: Comprando en Binance (Precio bajo)...");
        await new Promise(r => setTimeout(r, 1500));
        addLog("PASO 2: Transfiriendo a WhiteBIT vía TRC-20...");
        await new Promise(r => setTimeout(r, 2000));
        addLog("PASO 3: Venta ejecutada en WhiteBIT (Precio alto).");
        await new Promise(r => setTimeout(r, 1500));
        addLog("PASO 4: Retornando capital + ganancia a Binance.");
        await new Promise(r => setTimeout(r, 2000));
        addLog("✅ CICLO COMPLETADO. Beneficio asegurado.");
    }

    render();
    setInterval(updatePrices, 3000);
</script>
</body>
</html>
