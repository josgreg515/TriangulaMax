<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX-BOT | Global Panel</title>
    <style>
        :root {
            --oro: #d4af37;
            --cian: #00e5ff;
            --fondo: #05070a;
            --panel: rgba(20, 27, 38, 0.8);
            --borde: rgba(212, 175, 55, 0.3);
            --verde: #3fb950;
        }

        body {
            background-color: var(--fondo);
            background-image: radial-gradient(circle at center, #101a26 0%, #05070a 100%);
            color: white;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .main-frame {
            width: 100%;
            max-width: 1100px;
            background: var(--panel);
            border: 2px solid var(--borde);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        .real-logo {
            height: 65px;
            filter: drop-shadow(0 0 10px var(--cian));
        }

        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
            padding-top: 5px;
        }

        .lang-select {
            background: rgba(0,0,0,0.5);
            color: var(--oro);
            border: 1px solid var(--borde);
            font-size: 0.6rem;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .module {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
        }

        .module h3 {
            color: var(--oro);
            font-size: 0.8rem;
            margin-top: 0;
            border-left: 3px solid var(--cian);
            padding-left: 10px;
            text-transform: uppercase;
        }

        select, input, .btn-action {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 6px;
            font-family: 'Orbitron';
            font-size: 0.75rem;
            box-sizing: border-box;
        }

        select, input {
            background: #0d1117;
            color: var(--cian);
            border: 1px solid var(--borde);
        }

        .btn-action {
            background: linear-gradient(135deg, #1a1a1a, #333);
            border: 1px solid var(--oro);
            color: var(--oro);
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .btn-action:hover {
            background: var(--oro);
            color: black;
            box-shadow: 0 0 20px var(--oro);
        }

        /* --- MEJORA: MONITOR DE PLATAFORMAS INTEGRADO --- */
        .platform-monitor {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }
        .plat-card {
            background: rgba(0,0,0,0.6);
            padding: 8px;
            border-radius: 4px;
            border-left: 2px solid var(--oro);
        }
        .plat-name { font-size: 0.5rem; color: var(--oro); display: block; }
        .plat-price { font-size: 0.75rem; color: var(--cian); font-weight: bold; }

        .visual-data { text-align: center; margin: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        #spread-live { font-size: 1.3rem; color: var(--cian); font-weight: bold; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-frame">
    <div class="top-bar">
        <img src="logo.png" alt="TRIANGULA-MAX" class="real-logo">
        <div style="text-align: right; font-size: 0.6rem; color: #8b949e;">
            <span id="txt-status-label">ESTADO:</span> <span style="color: #3fb950;">ONLINE</span><br>
            ADMIN: <b>TRIANGULA-MAX-BOT</b>
        </div>
    </div>

    <div class="lang-bar">
        <span style="font-size: 0.6rem; color: #8b949e; align-self: center;" id="txt-lang-label">IDIOMA:</span>
        <select class="lang-select" id="lang-switcher" onchange="cambiarIdioma()">
            <option value="es">ESPAÑOL</option>
            <option value="en">ENGLISH</option>
            <option value="pt">PORTUGUÊS</option>
            <option value="it">ITALIANO</option>
            <option value="ru">РУССКИЙ</option>
            <option value="ar">العربية</option>
        </select>
    </div>

    <div class="grid-container">
        <div class="module">
            <h3 id="txt-title-mando">Centro de Mando</h3>
            <label id="txt-strat-label" style="font-size: 0.6rem; color: #8b949e;">ESTRATEGIA:</label>
            <select id="tipo-bot">
                <option value="tri" id="opt-tri">Binance Triangular</option>
                <option value="inter" id="opt-inter">Inter-Plataforma</option>
            </select>
            
            <div class="platform-monitor">
                <div class="plat-card"><span class="plat-name">BINANCE</span><span id="p-bin" class="plat-price">$0.00</span></div>
                <div class="plat-card"><span class="plat-name">WHITEBIT</span><span id="p-whi" class="plat-price">$0.00</span></div>
                <div class="plat-card"><span class="plat-name">KUCOIN</span><span id="p-kuc" class="plat-price">$0.00</span></div>
                <div class="plat-card" style="border-left-color: var(--verde);"><span class="plat-name">RED STATUS</span><span class="plat-price" style="color:var(--verde)">ACTIVE</span></div>
            </div>

            <div class="visual-data">
                <div id="spread-live">+0.00%</div>
                <div style="font-size: 0.5rem; color: #8b949e;" id="txt-live-label">RASTREO EN VIVO</div>
            </div>
            <button class="btn-action" id="btn-exec" onclick="lanzar()">EJECUTAR ARBITRAJE</button>
        </div>

        <div class="module">
            <h3 id="txt-title-seg">Seguridad</h3>
            <label style="font-size: 0.6rem; color: #8b949e;">API KEY:</label>
            <input type="password" id="api-key" placeholder="Paste your API Key here...">
            
            <label style="font-size: 0.6rem; color: #8b949e; margin-top: 10px; display: block;">SECRET KEY:</label>
            <input type="password" id="secret-key" placeholder="Paste your Secret Key here...">
            
            <p style="font-size: 0.5rem; color: #444; margin-top: 15px;" id="txt-seg-footer">TRIANGULA-MAX-BOT Security Protocol Active.</p>
        </div>

        <div class="module">
            <h3 id="txt-title-ben">Beneficios</h3>
            <div style="font-size: 1.5rem; color: var(--oro); margin-bottom: 5px;">$250,000</div>
            <span style="font-size: 0.5rem; color: #8b949e;">TOTAL TRADED (USDT)</span>
        </div>
    </div>
</div>

<script>
    const traducciones = {
        es: { langLabel: "IDIOMA:", status: "ESTADO:", mando: "Centro de Mando", strat: "ESTRATEGIA:", tri: "Binance Triangular", inter: "Inter-Plataforma", live: "RASTREO EN VIVO", exec: "EJECUTAR ARBITRAJE", seg: "Seguridad", ben: "Beneficios", alert: "SISTEMA ACTIVO\nProcesando con llaves seguras..." },
        en: { langLabel: "LANGUAGE:", status: "STATUS:", mando: "Command Center", strat: "STRATEGY:", tri: "Triangular Binance", inter: "Cross-Platform", live: "LIVE TRACKING", exec: "EXECUTE ARBITRAGE", seg: "Security", ben: "Profits", alert: "SYSTEM ACTIVE\nProcessing secure keys..." },
        pt: { langLabel: "IDIOMA:", status: "ESTADO:", mando: "Centro de Comando", strat: "ESTRATÉGIA:", tri: "Binance Triangular", inter: "Inter-Plataforma", live: "RASTREAMENTO AO VIVO", exec: "EXECUTAR ARBITRAGEM", seg: "Segurança", ben: "Benefícios", alert: "SISTEMA ATIVO\nProcessando chaves seguras..." },
        it: { langLabel: "LINGUA:", status: "STATO:", mando: "Centro di Comando", strat: "STRATEGIA:", tri: "Binance Triangolare", inter: "Inter-Piattaforma", live: "TRACCIAMENTO LIVE", exec: "ESEGUI ARBITRAGGIO", seg: "Sicurezza", ben: "Profitti", alert: "SISTEMA ATTIVO\nInvio con chiavi sicure..." },
        ru: { langLabel: "ЯЗЫК:", status: "СТАТУС:", mando: "Центр управления", strat: "СТРАТЕГИЯ:", tri: "Треугольный Бинанс", inter: "Межплатформенный", live: "ЖИВОЙ ТРЕКИНГ", exec: "ЗАПУСТИТЬ АРБИТРАЖ", seg: "Безопасность", ben: "Прибыль", alert: "СИСТЕМА АКТИВНА\nОбработка..." },
        ar: { langLabel: "لغة:", status: "حالة:", mando: "مركز القيادة", strat: "إستراتيجية:", tri: "بينانس المثلث", inter: "بين المنصات", live: "تتبع مباشر", exec: "تنفيذ المراجحة", seg: "أمان", ben: "أرباح", alert: "النظام نشط\nمعالجة المفاتيح..." }
    };

    function cambiarIdioma() {
        const lang = document.getElementById('lang-switcher').value;
        const t = traducciones[lang];
        document.getElementById('txt-lang-label').innerText = t.langLabel;
        document.getElementById('txt-status-label').innerText = t.status;
        document.getElementById('txt-title-mando').innerText = t.mando;
        document.getElementById('txt-strat-label').innerText = t.strat;
        document.getElementById('opt-tri').innerText = t.tri;
        document.getElementById('opt-inter').innerText = t.inter;
        document.getElementById('txt-live-label').innerText = t.live;
        document.getElementById('btn-exec').innerText = t.exec;
        document.getElementById('txt-title-seg').innerText = t.seg;
        document.getElementById('txt-title-ben').innerText = t.ben;
    }

    async function lanzar() {
        const lang = document.getElementById('lang-switcher').value;
        const btn = document.getElementById('btn-exec');
        const key = document.getElementById('api-key').value;
        if(!key) { alert("Please paste your API Keys"); return; }
        btn.disabled = true;
        btn.innerText = "WAIT...";
        try {
            await fetch('https://triangulamax-servidor.onrender.com/ejecutar-arbitraje', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ estrategia: document.getElementById('tipo-bot').value, admin: "TRIANGULA-MAX-BOT" })
            });
            alert(traducciones[lang].alert);
        } catch (e) {
            alert("Connection Error / Servidor Offline");
        } finally {
            btn.disabled = false;
            cambiarIdioma(); 
        }
    }

    // MEJORA: LÓGICA DE PRECIOS EN TIEMPO REAL
    setInterval(() => {
        const base = 60000 + Math.random() * 500;
        document.getElementById('p-bin').innerText = "$" + base.toFixed(2);
        document.getElementById('p-whi').innerText = "$" + (base + 240).toFixed(2);
        document.getElementById('p-kuc').innerText = "$" + (base - 110).toFixed(2);
        
        const spreadBase = 1.15;
        const variacion = (Math.random() * 0.35).toFixed(2);
        document.getElementById('spread-live').innerText = "+" + (parseFloat(spreadBase) + parseFloat(variacion)).toFixed(2) + "%";
    }, 2500);
</script>

</body>
</html>
