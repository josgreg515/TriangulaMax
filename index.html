<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX-BOT :: Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #0d1117;
            --gris: #161b22;
            --oro: #d4af37;
            --cian: #00e5ff;
            --verde: #3fb950;
            --borde: #30363d;
        }

        body {
            background-color: var(--fondo);
            color: white;
            font-family: 'Roboto Mono', monospace;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%; max-width: 420px;
            background-color: var(--gris);
            border: 2px solid var(--oro); /* Borde dorado para resaltar el profesionalismo */
            border-radius: 15px; padding: 25px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            margin: 20px;
        }

        /* LOGO OFICIAL */
        .header {
            text-align: center; margin-bottom: 20px;
            border-bottom: 1px solid var(--borde); padding-bottom: 15px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--oro); font-size: 1.5rem; margin: 0;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
        }

        /* SISTEMA DE PESTAÑAS FUNCIONAL */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 10px 5px; background: #1c2128;
            border: 1px solid var(--borde); color: #8b949e;
            font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; border-radius: 5px;
        }
        .tab-btn.active {
            border-color: var(--oro); color: var(--oro); background: rgba(212, 175, 55, 0.1);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .module {
            margin-bottom: 15px; padding: 15px;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--borde); border-radius: 8px;
        }

        /* ACORDEONES EXCHANGES */
        .accordion {
            background: #1c2128; color: var(--oro); cursor: pointer;
            padding: 12px; width: 100%; border: 1px solid var(--borde);
            text-align: left; font-size: 0.7rem; font-family: 'Orbitron';
            border-radius: 4px; margin-bottom: 5px;
            display: flex; justify-content: space-between;
        }

        .panel { padding: 0 10px; background: #0d1117; max-height: 0; overflow: hidden; transition: max-height 0.2s; }
        input {
            width: 90%; background: var(--fondo); border: 1px solid var(--borde);
            color: var(--cian); padding: 10px; font-size: 0.7rem; margin: 10px 0; border-radius: 4px;
        }

        /* MONITOR DE PRECIOS */
        .price-display { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .price-box { text-align: center; }
        .price-box span { display: block; font-size: 0.5rem; color: #8b949e; margin-bottom: 5px; }
        #p-buy { color: var(--cian); font-size: 1.1rem; font-weight: bold; }
        #p-sell { color: var(--verde); font-size: 1.1rem; font-weight: bold; }
        #spread-val { color: var(--oro); font-size: 1.3rem; font-weight: bold; font-family: 'Orbitron'; }

        /* BOTONES DE MODO */
        .mode-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-mode {
            flex: 1; padding: 10px; font-family: 'Orbitron'; font-size: 0.6rem;
            background: #1c2128; border: 1px solid var(--borde); color: #8b949e; cursor: pointer; border-radius: 5px;
        }
        .btn-mode.active { border-color: var(--oro); color: var(--oro); background: rgba(212, 175, 55, 0.1); }

        .btn-main {
            width: 100%; background: var(--verde); color: white; border: none;
            padding: 15px; border-radius: 8px; font-family: 'Orbitron'; font-size: 0.9rem; cursor: pointer;
        }

        .btn-info {
            width: 100%; background: none; border: 1px solid var(--oro); color: var(--oro);
            padding: 10px; border-radius: 8px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; margin-top: 20px;
        }

        /* MODAL SEGURIDAD */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-body { background: var(--gris); margin: 15% auto; padding: 25px; border: 1px solid var(--oro); width: 80%; max-width: 400px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TRIANGULA-MAX-BOT</h1>
        <div style="font-size: 0.5rem; color: #8b949e;">SISTEMA PROFESIONAL DE ARBITRAJE</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('market')">MERCADO</button>
        <button class="tab-btn" onclick="showTab('keys')">CONEXIÓN API</button>
    </div>

    <div id="market" class="tab-content active">
        <div class="module">
            <div class="price-display">
                <div class="price-box"><span>COMPRA</span><div id="p-buy">$60,100.00</div></div>
                <div style="color:var(--oro); font-size:1.5rem;">➔</div>
                <div class="price-box"><span>VENTA</span><div id="p-sell">$60,850.00</div></div>
            </div>
            <div style="text-align: center; border-top: 1px solid var(--borde); padding-top: 10px;">
                <span style="font-size: 0.6rem; color: #8b949e;">SPREAD PROTEGIDO</span>
                <div id="spread-val">+1.24%</div>
            </div>
        </div>

        <div class="module">
            <div class="mode-row">
                <button id="m-manual" class="btn-mode active" onclick="setOpMode('manual')">MANUAL</button>
                <button id="m-auto" class="btn-mode" onclick="setOpMode('auto')">AUTOMÁTICO</button>
            </div>
            <button class="btn-main" onclick="ejecutar()">INICIAR OPERACIÓN</button>
        </div>
    </div>

    <div id="keys" class="tab-content">
        <div class="module">
            <h3>Configurar Exchanges</h3>
            <button class="accordion" onclick="toggleAcc(this)">BINANCE <span>▼</span></button>
            <div class="panel"><input type="text" placeholder="API Key"><input type="password" placeholder="Secret Key"></div>
            
            <button class="accordion" onclick="toggleAcc(this)">WHITEBIT <span>▼</span></button>
            <div class="panel"><input type="text" placeholder="API Key"><input type="password" placeholder="Secret Key"></div>
        </div>
    </div>

    <button class="btn-info" onclick="toggleModal(true)">VIEW SECURITY PROTOCOLS</button>
</div>

<div id="secModal" class="modal">
    <div class="modal-body">
        <h2 style="color:var(--oro); font-family:'Orbitron'; font-size:0.8rem; text-align:center;">ESCUDO ANTI-SLIPPAGE</h2>
        <p style="font-size:0.7rem; color:#c9d1d9;">El bot monitorea el spread en tiempo real. Si la volatilidad pone en riesgo el capital, la operación se aborta automáticamente.</p>
        <button class="btn-info" onclick="toggleModal(false)">CERRAR</button>
    </div>
</div>

<script>
    // Navegación de Pestañas
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Acordeones para Llaves
    function toggleAcc(btn) {
        let panel = btn.nextElementSibling;
        panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
    }

    // Selección de Modo
    function setOpMode(mode) {
        document.getElementById('m-manual').classList.remove('active');
        document.getElementById('m-auto').classList.remove('active');
        document.getElementById('m-' + mode).classList.add('active');
    }

    // Modal
    function toggleModal(show) { document.getElementById('secModal').style.display = show ? 'block' : 'none'; }

    // Ejecución
    function ejecutar() { alert("⚙️ Verificando Spread y Conexiones..."); }

    // Simulador de Precios
    setInterval(() => {
        let b = 60000 + Math.random()*100;
        let v = b + (500 + Math.random()*300);
        document.getElementById('p-buy').innerText = "$" + b.toFixed(2);
        document.getElementById('p-sell').innerText = "$" + v.toFixed(2);
        document.getElementById('spread-val').innerText = "+" + ((v-b)/b*100*0.8).toFixed(2) + "%";
    }, 3000);
</script>
</body>
</html>
