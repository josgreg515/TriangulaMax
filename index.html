<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX | Edición José Gregorio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #d4af37; --cian: #00e5ff; --fondo: #0a0e14;
            --panel: rgba(16, 22, 30, 0.95); --borde: rgba(0, 229, 255, 0.2);
            --verde: #3fb950; --rojo: #ff4d4d;
        }

        body {
            background: var(--fondo) radial-gradient(circle at top, #16222e 0%, #0a0e14 100%);
            color: white; font-family: 'Orbitron', sans-serif;
            margin: 0; display: flex; justify-content: center; padding: 10px; min-height: 100vh;
        }

        .main-frame {
            width: 100%; max-width: 480px; background: var(--panel);
            border: 2px solid var(--borde); border-radius: 25px; padding: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.7); box-sizing: border-box;
        }

        /* HEADER SEGÚN CAPTURA */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(0,229,255,0.1); padding-bottom: 10px; }
        .logo-img { height: 40px; filter: drop-shadow(0 0 8px var(--cian)); }
        .admin-info { text-align: right; font-size: 0.5rem; color: #8b949e; line-height: 1.4; }

        .lang-bar { margin-bottom: 15px; }
        .lang-select { width: 100%; background: #0d1117; color: var(--oro); border: 1px solid var(--borde); font-size: 0.65rem; padding: 10px; border-radius: 6px; appearance: none; text-align: center; }

        .nav-tabs { display: flex; gap: 4px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #1c2128; border: 1px solid var(--borde); color: #8b949e; padding: 12px 2px; font-family: 'Orbitron'; font-size: 0.5rem; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { border-color: var(--oro); color: var(--oro); background: rgba(212, 175, 55, 0.1); }

        .sub-panel { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; }

        .mando-title { color: var(--oro); font-size: 0.8rem; border-left: 3px solid var(--cian); padding-left: 10px; margin-bottom: 15px; text-transform: uppercase; }

        /* PRECIOS EXACTOS DEL USUARIO */
        .price-grid { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .price-box { text-align: center; }
        .price-box span { display: block; font-size: 0.45rem; color: #8b949e; margin-bottom: 5px; }
        .price-val { font-family: 'Roboto Mono'; font-size: 0.9rem; color: var(--cian); font-weight: bold; }
        .price-val.sell { color: var(--verde); }

        .spread-box { text-align: center; margin-bottom: 20px; }
        .spread-main { font-size: 1.4rem; color: var(--oro); font-weight: bold; }
        .spread-sub { font-size: 0.45rem; color: #8b949e; letter-spacing: 2px; }

        /* INTEGRACIÓN DE REDES BARATAS */
        label { font-size: 0.5rem; color: var(--oro); display: block; margin: 15px 0 5px 5px; text-transform: uppercase; }
        .custom-select { width: 100%; background: #0d1117; border: 1px solid #333; color: var(--cian); padding: 12px; border-radius: 8px; font-family: 'Orbitron'; font-size: 0.7rem; margin-bottom: 10px; }

        .btn-exec { width: 100%; background: var(--oro); color: black; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); margin-top: 10px; }

        .log-terminal { background: #000; border: 1px solid #222; height: 80px; overflow-y: auto; padding: 10px; font-family: 'Roboto Mono'; font-size: 0.5rem; color: var(--verde); border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="main-frame">
    <div class="header">
        <img src="logo.png" alt="TRIANGULA-MAX" class="logo-img">
        <div class="admin-info">ESTADO: <span style="color:var(--verde)">ONLINE</span><br>ADMIN: JOSÉ GREGORIO</div>
    </div>

    <div class="lang-bar">
        <select class="lang-select">
            <option>ESPAÑOL</option>
            <option>ENGLISH</option>
        </select>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active">ARBITRAJE</button>
        <button class="tab-btn">HISTORIAL</button>
        <button class="tab-btn">LLAVES API</button>
    </div>

    <div class="sub-panel">
        <div class="mando-title">CENTRO DE MANDO</div>
        
        <label>SELECCIONAR ACTIVO:</label>
        <select class="custom-select" id="asset-selector">
            <option value="btc">BTC/USDT</option>
            <option value="eth">ETH/USDT</option>
            <option value="sol">SOL/USDT</option>
        </select>

        <label>RED DE TRANSFERENCIA (ECONÓMICA):</label>
        <select class="custom-select" id="net-selector">
            <option value="solana">Solana (SOL) - Comisión: $0.01</option>
            <option value="polygon">Polygon (MATIC) - Comisión: $0.02</option>
            <option value="tron">TRON (TRC-20) - Comisión: $1.00</option>
            <option value="litecoin">Litecoin (LTC) - Comisión: $0.15</option>
        </select>

        <div class="price-grid">
            <div class="price-box">
                <span>BINANCE (BUY)</span>
                <div class="price-val" id="p-buy">$71,946.205</div>
            </div>
            <div style="color:var(--oro); font-size: 1.2rem;">→</div>
            <div class="price-box">
                <span>WHITEBIT (SELL)</span>
                <div class="price-val sell" id="p-sell">$73,025.398</div>
            </div>
        </div>

        <div class="spread-box">
            <div class="spread-main" id="spread-val">+1.502%</div>
            <div class="spread-sub">RASTREO EN VIVO</div>
        </div>

        <button class="btn-exec" onclick="iniciarCiclo()">INICIAR CICLO DE ARBITRAJE</button>

        <div class="log-terminal" id="log">> Sistema listo. Administrador: José Gregorio.</div>
    </div>
</div>

<script>
    function iniciarCiclo() {
        const log = document.getElementById('log');
        const net = document.getElementById('net-selector').value.toUpperCase();
        log.innerHTML = `> Iniciando escaneo en BINANCE...`;
        setTimeout(() => { log.innerHTML += `<br>> Compra ejecutada. Transfiriendo vía ${net}...`; }, 1200);
        setTimeout(() => { log.innerHTML += `<br>> Venta finalizada en WHITEBIT.`; }, 2500);
        setTimeout(() => { log.innerHTML += `<br>> <span style="color:var(--oro)">✅ CICLO EXITOSO. GANANCIA PROTEGIDA.</span>`; }, 3500);
    }
</script>

</body>
</html>
