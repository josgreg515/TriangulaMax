<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX | Panel Oficial</title>
    <style>
        :root {
            --oro: #d4af37;
            --cian: #00e5ff;
            --fondo: #05070a;
            --panel: rgba(20, 27, 38, 0.8);
            --borde: rgba(212, 175, 55, 0.3);
        }

        body {
            background-color: var(--fondo);
            background-image: radial-gradient(circle at center, #101a26 0%, #05070a 100%);
            color: white;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 10px;
            min-height: 100vh;
        }

        .main-frame {
            width: 100%;
            max-width: 1100px;
            background: var(--panel);
            border: 2px solid var(--borde);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        /* Cabecera con Logo Dominante */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* LOGO MÁS GRANDE */
        .real-logo {
            height: 85px; 
            width: auto;
            filter: drop-shadow(0 0 15px var(--cian));
        }

        /* TÍTULO MÁS PEQUEÑO */
        .logo-area h1 {
            font-size: 1.1rem; 
            margin: 0;
            background: linear-gradient(to right, #fff, var(--cian));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        /* INFO ADYACENTE MÁS PEQUEÑA */
        .admin-info {
            font-size: 0.55rem; 
            text-align: right;
            line-height: 1.4;
            color: #8b949e;
        }

        .admin-info b {
            color: white;
            font-size: 0.6rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .module {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            position: relative;
        }

        .module h3 {
            color: var(--oro);
            font-size: 0.7rem;
            margin-top: 0;
            border-left: 3px solid var(--cian);
            padding-left: 10px;
            text-transform: uppercase;
        }

        .circle-chart {
            width: 70px;
            height: 70px;
            border: 4px solid var(--cian);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--cian);
            margin: 10px auto;
        }

        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, #1a1a1a, #333);
            border: 1px solid var(--oro);
            color: var(--oro);
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .profit-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-top: 8px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-frame">
    <div class="top-bar">
        <div class="logo-area">
            <img src="logo.png" alt="Logo Triangula-Max" class="real-logo">
            <h1>TRIANGULA-MAX</h1>
        </div>
        <div class="admin-info">
            SISTEMA: <span style="color: #3fb950;">EN VIVO</span><br>
            OPERADOR: <b>JOSÉ GREGORIO</b>
        </div>
    </div>

    <div class="grid-container">
        <div class="module">
            <h3>Estado del Centinela</h3>
            <div class="circle-chart">
                <span style="font-size: 0.7rem;">+1.45%</span>
            </div>
            <p style="text-align:center; font-size:0.8rem; color:var(--cian); margin:5px 0;">BTC / USDT</p>
            <button class="btn-action">EJECUTAR ARBITRAJE</button>
        </div>

        <div class="module">
            <h3>Conexión Segura</h3>
            <p style="font-size: 0.55rem; color: #8b949e; margin-bottom: 2px;">BINANCE API</p>
            <div style="background:rgba(255,255,255,0.05); padding:6px; border-radius:4px; font-size:0.65rem; margin-bottom:10px;">••••••••••••••••</div>
            <p style="font-size: 0.55rem; color: #8b949e; margin-bottom: 2px;">BYBIT API</p>
            <div style="background:rgba(255,255,255,0.05); padding:6px; border-radius:4px; font-size:0.65rem;">••••••••••••••••</div>
        </div>

        <div class="module">
            <h3>Beneficios</h3>
            <span style="font-size: 0.6rem;">OPERADO TOTAL:</span>
            <div style="color: var(--oro); font-size: 1.4rem; margin-bottom: 8px; text-shadow: 0 0 10px rgba(212,175,55,0.3);">$250,000</div>
            <div class="profit-row">
                <span>COMUNIDAD:</span>
                <span style="color: #3fb950;">$3,625</span>
            </div>
            <div class="profit-row">
                <span>CONDICIÓN JGT:</span>
                <span style="color: var(--cian);">$725</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
