<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIANGULA-MAX-BOT | Global Panel</title>
    <style>
        :root {
            --oro: #d4af37;
            --cian: #00e5ff;
            --fondo: #05070a;
            --panel: rgba(20, 27, 38, 0.8);
            --borde: rgba(212, 175, 55, 0.3);
        }

        body {
            background-color: var(--fondo);
            background-image: radial-gradient(circle at center, #101a26 0%, #05070a 100%);
            color: white;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .main-frame {
            width: 100%;
            max-width: 1100px;
            background: var(--panel);
            border: 2px solid var(--borde);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        /* Selector de Idioma Superior */
        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
        }

        .lang-select {
            background: #0d1117;
            color: var(--oro);
            border: 1px solid var(--oro);
            font-size: 0.6rem;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .real-logo {
            height: 75px;
            filter: drop-shadow(0 0 15px var(--cian));
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .module {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            position: relative;
        }

        .module h3 {
            color: var(--oro);
            font-size: 0.8rem;
            margin-top: 0;
            border-left: 3px solid var(--cian);
            padding-left: 10px;
            text-transform: uppercase;
        }

        select, .btn-action {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 5px;
            font-family: 'Orbitron';
            font-size: 0.75rem;
        }

        select {
            background: #0d1117;
            color: var(--cian);
            border: 1px solid var(--borde);
        }

        .btn-action {
            background: linear-gradient(135deg, #1a1a1a, #333);
            border: 1px solid var(--oro);
            color: var(--oro);
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-action:hover {
            background: var(--oro);
            color: black;
            box-shadow: 0 0 20px var(--oro);
        }

        .visual-data {
            text-align: center;
            margin: 20px 0;
        }

        #spread-live {
            font-size: 1.2rem;
            color: var(--cian);
            text-shadow: 0 0 10px var(--cian);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-frame">
    <div class="lang-bar">
        <span style="font-size: 0.6rem; color: #8b949e; align-self: center;" id="txt-lang-label">IDIOMA:</span>
        <select class="lang-select" id="lang-switcher" onchange="cambiarIdioma()">
            <option value="es">ESPAÑOL</option>
            <option value="en">ENGLISH</option>
            <option value="pt">PORTUGUÊS</option>
            <option value="it">ITALIANO</option>
            <option value="ru">РУССКИЙ</option>
            <option value="ar">العربية</option>
        </select>
    </div>

    <div class="top-bar">
        <img src="logo.png" alt="TRIANGULA-MAX" class="real-logo">
        <div style="text-align: right; font-size: 0.6rem; color: #8b949e;">
            <span id="txt-status-label">ESTADO:</span> <span style="color: #3fb950;">ONLINE</span><br>
            ADMIN: <b>TRIANGULA-MAX-BOT</b>
        </div>
    </div>

    <div class="grid-container">
        <div class="module">
            <h3 id="txt-title-mando">Centro de Mando</h3>
            <label id="txt-strat-label" style="font-size: 0.6rem; color: #8b949e;">ESTRATEGIA:</label>
            <select id="tipo-bot">
                <option value="tri" id="opt-tri">Binance Triangular</option>
                <option value="inter" id="opt-inter">Inter-Plataforma</option>
            </select>
            
            <label id="txt-par-label" style="font-size: 0.6rem; color: #8b949e; margin-top: 10px; display: block;">ACTIVO:</label>
            <select id="par-bot">
                <option>BTC / USDT</option>
                <option>ETH / USDT</option>
                <option>SOL / USDT</option>
            </select>

            <div class="visual-data">
                <div id="spread-live">+1.45%</div>
                <div style="font-size: 0.5rem; color: #8b949e;" id="txt-live-label">RASTREO EN VIVO</div>
            </div>
            <button class="btn-action" id="btn-exec" onclick="lanzar()">EJECUTAR ARBITRAJE</button>
        </div>

        <div class="module">
            <h3 id="txt-title-seg">Seguridad</h3>
            <p style="font-size: 0.6rem; color: #8b949e;">API KEYS (ENCRYPTED)</p>
            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:5px; color:var(--cian); font-size: 0.7rem; border: 1px solid rgba(0,229,255,0.1);">
                ••••••••••••••••••••
            </div>
            <p style="font-size: 0.5rem; color: #444; margin-top: 15px;" id="txt-seg-footer">TRIANGULA-MAX-BOT Security Protocol.</p>
        </div>

        <div class="module">
            <h3 id="txt-title-ben">Beneficios</h3>
            <div style="font-size: 1.5rem; color: var(--oro); margin-bottom: 5px;">$250,000</div>
            <span style="font-size: 0.5rem; color: #8b949e;">TOTAL TRADED</span>
        </div>
    </div>
</div>

<script>
    // Diccionario Multi-idioma
    const traducciones = {
        es: {
            langLabel: "IDIOMA:", status: "ESTADO:", mando: "Centro de Mando", strat: "ESTRATEGIA:", par: "ACTIVO:",
            tri: "Binance Triangular", inter: "Inter-Plataforma", live: "RASTREO EN VIVO", 
            exec: "EJECUTAR ARBITRAJE", seg: "Seguridad", ben: "Beneficios", alert: "SISTEMA ACTIVO\nEnviando orden..."
        },
        en: {
            langLabel: "LANGUAGE:", status: "STATUS:", mando: "Command Center", strat: "STRATEGY:", par: "ASSET:",
            tri: "Triangular Binance", inter: "Cross-Platform", live: "LIVE TRACKING", 
            exec: "EXECUTE ARBITRAGE", seg: "Security", ben: "Profits", alert: "SYSTEM ACTIVE\nSending order..."
        },
        pt: {
            langLabel: "IDIOMA:", status: "ESTADO:", mando: "Centro de Comando", strat: "ESTRATÉGIA:", par: "ATIVO:",
            tri: "Binance Triangular", inter: "Inter-Plataforma", live: "RASTREAMENTO AO VIVO", 
            exec: "EXECUTAR ARBITRAGEM", seg: "Segurança", ben: "Benefícios", alert: "SISTEMA ATIVO\nEnviando ordem..."
        },
        it: {
            langLabel: "LINGUA:", status: "STATO:", mando: "Centro di Comando", strat: "STRATEGIA:", par: "ATTIVO:",
            tri: "Binance Triangolare", inter: "Inter-Piattaforma", live: "TRACCIAMENTO LIVE", 
            exec: "ESEGUI ARBITRAGGIO", seg: "Sicurezza", ben: "Profitti", alert: "SISTEMA ATTIVO\nInvio ordine..."
        },
        ru: {
            langLabel: "ЯЗЫК:", status: "СТАТУС:", mando: "Центр управления", strat: "СТРАТЕГИЯ:", par: "АКТИВ:",
            tri: "Треугольный Бинанс", inter: "Межплатформенный", live: "ЖИВОЙ ТРЕКИНГ", 
            exec: "ЗАПУСТИТЬ АРБИТРАЖ", seg: "Безопасность", ben: "Прибыль", alert: "СИСТЕМА АКТИВНА\nОтправка заказа..."
        },
        ar: {
            langLabel: "لغة:", status: "حالة:", mando: "مركز القيادة", strat: "إستراتيجية:", par: "الأصل:",
            tri: "بينانس المثلث", inter: "بين المنصات", live: "تتبع مباشر", 
            exec: "تنفيذ المراجحة", seg: "أمان", ben: "أرباح", alert: "النظام نشط\nإرسال الطلب..."
        }
    };

    function cambiarIdioma() {
        const lang = document.getElementById('lang-switcher').value;
        const t = traducciones[lang];

        document.getElementById('txt-lang-label').innerText = t.langLabel;
        document.getElementById('txt-status-label').innerText = t.status;
        document.getElementById('txt-title-mando').innerText = t.mando;
        document.getElementById('txt-strat-label').innerText = t.strat;
        document.getElementById('txt-par-label').innerText = t.par;
        document.getElementById('opt-tri').innerText = t.tri;
        document.getElementById('opt-inter').innerText = t.inter;
        document.getElementById('txt-live-label').innerText = t.live;
        document.getElementById('btn-exec').innerText = t.exec;
        document.getElementById('txt-title-seg').innerText = t.seg;
        document.getElementById('txt-title-ben').innerText = t.ben;
    }

    // Script de Ejecución Real y Conexión
    async function lanzar() {
        const lang = document.getElementById('lang-switcher').value;
        const btn = document.getElementById('btn-exec');
        const bot = document.getElementById('tipo-bot').value;
        const par = document.getElementById('par-bot').value;

        btn.disabled = true;
        btn.innerText = "WAIT...";

        try {
            // Conexión con tu servidor Python (App.py)
            const res = await fetch('https://triangulamax-servidor.onrender.com/ejecutar-arbitraje', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    estrategia: bot,
                    activo: par,
                    admin: "TRIANGULA-MAX-BOT"
                })
            });
            alert(traducciones[lang].alert);
        } catch (e) {
            alert("Connection Error - Servidor Offline en Render");
        } finally {
            btn.disabled = false;
            cambiarIdioma(); 
        }
    }

    // Script de Simulación de Datos en vivo
    setInterval(() => {
        const base = 1.15;
        const variacion = (Math.random() * 0.45).toFixed(2);
        const el = document.getElementById('spread-live');
        if(el) el.innerText = "+" + (parseFloat(base) + parseFloat(variacion)).toFixed(2) + "%";
    }, 3000);
</script>

</body>
</html>
